<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light;
    --bg: #fcfbf8;
    --surface: #ffffff;
    --surface-alt: #f7f5f0;
    --surface-hover: #f0ede5;
    --border: rgba(20,20,20,0.06);
    --border-med: rgba(20,20,20,0.1);
    --text: #1f1d1a;
    --text-muted: #7c7973;
    --text-soft: #aba89f;
    --accent: #8b7a5a;
    --accent-soft: #e8e0d0;
    --ring-track: #ece9e2;
    --ring-daily: #a8c98a;
    --ring-daily-soft: #e8f0db;
    --ring-weekly: #a7b8d4;
    --ring-weekly-soft: #dfe5ef;
    --ring-total: #d4a78a;
    --ring-total-soft: #f0e0d0;
    --done-bg: #d9e8c6;
    --done-bg-hover: #c7dbb0;
    --done-check: #5a7a3a;
    --streak-bg: #f5e9d1;
    --streak-text: #8a6c2a;
    --info-bg: #e3ecf5;
    --info-text: #4a6b8f;
    --today-accent: #f5ead4;
    --danger: #b54e4e;
    --shadow-sm: 0 1px 2px rgba(20,20,20,0.03);
    --shadow-md: 0 2px 8px rgba(20,20,20,0.04);
    --radius: 10px;
    --radius-lg: 16px;
    --radius-xl: 20px;
  }

  /* Dark mode — activated by adding data-theme="dark" to the html element */
  html[data-theme="dark"] {
    color-scheme: dark;
    --bg: #18171a;
    --surface: #232226;
    --surface-alt: #2a292d;
    --surface-hover: #33323a;
    --border: rgba(255,255,255,0.06);
    --border-med: rgba(255,255,255,0.1);
    --text: #eeeae0;
    --text-muted: #9a9690;
    --text-soft: #63605a;
    --accent: #c4b088;
    --accent-soft: #3a342a;
    --ring-track: #32313a;
    --ring-daily: #8bac6e;
    --ring-daily-soft: #2d3a22;
    --ring-weekly: #7d94b5;
    --ring-weekly-soft: #222a38;
    --ring-total: #b88968;
    --ring-total-soft: #3a2c20;
    --done-bg: #3d4f2d;
    --done-bg-hover: #4a6038;
    --done-check: #c8e0a8;
    --streak-bg: #4a3f28;
    --streak-text: #e0c688;
    --info-bg: #283340;
    --info-text: #a3bcd8;
    --today-accent: #403824;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.15);
    --shadow-md: 0 2px 8px rgba(0,0,0,0.2);
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 0;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  #app {
    max-width: 1080px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  h1 {
    font-size: 28px;
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.02em;
  }
  h2 { font-size: 17px; font-weight: 500; margin: 0; letter-spacing: -0.01em; }
  p { margin: 0; }

  button {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border-med);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: -0.005em;
  }
  button:hover {
    background: var(--surface-hover);
    border-color: var(--border-med);
  }
  button:active { transform: scale(0.97); }
  button.primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  button.primary:hover { opacity: 0.88; background: var(--text); }
  button.ghost {
    background: transparent;
    border-color: transparent;
    color: var(--text-muted);
  }
  button.ghost:hover { background: var(--surface-alt); color: var(--text); }

  /* Theme toggle */
  .theme-toggle {
    width: 36px;
    height: 36px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border-med);
    color: var(--text-muted);
  }
  .theme-toggle:hover {
    background: var(--surface-hover);
    color: var(--text);
  }
  .theme-toggle svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  input[type="text"], input[type="number"] {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border-med);
    border-radius: var(--radius);
    width: 100%;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  /* ===== Header ===== */
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 16px;
  }
  .user-info {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 6px;
    font-weight: 400;
  }
  .user-info strong { font-weight: 500; color: var(--text); }
  .header-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  /* ===== Tabs ===== */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 2rem;
    background: var(--surface-alt);
    padding: 4px;
    border-radius: var(--radius);
    width: fit-content;
  }
  .tab-btn {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    background: transparent;
    border: none;
    color: var(--text-muted);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); background: transparent; }
  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  /* ===== Progress rings ===== */
  .rings-section {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }
  .ring-card {
    background: var(--surface);
    border-radius: var(--radius-xl);
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .ring-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .ring-pct {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .ring-pct-sub {
    font-size: 9px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }
  .ring-info { flex: 1; min-width: 0; }
  .ring-label {
    font-size: 10px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
  }
  .ring-title {
    font-size: 16px;
    font-weight: 500;
    margin-top: 3px;
    letter-spacing: -0.01em;
  }
  .ring-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .ring-accent-streak {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 3px 8px;
    background: var(--streak-bg);
    color: var(--streak-text);
    border-radius: 100px;
    margin-top: 8px;
    font-weight: 500;
  }

  /* ===== Week nav ===== */
  .week-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding: 6px;
  }
  .week-label-wrap { text-align: center; }
  .week-label {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .week-sub {
    font-size: 11px;
    color: var(--text-soft);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .week-nav-btn {
    width: 32px;
    height: 32px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--border-med);
    color: var(--text-muted);
  }
  .week-nav-btn:hover { color: var(--text); background: var(--surface); }
  .week-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ===== Grid table ===== */
  .grid-wrapper {
    background: var(--surface);
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    margin-bottom: 2rem;
  }

  .grid-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  .grid-table th {
    background: var(--surface-alt);
    font-weight: 500;
    font-size: 11px;
    color: var(--text-muted);
    padding: 14px 4px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .grid-table th.today, .grid-table td.today {
    background: var(--today-accent);
  }
  .grid-table th.habit-col {
    text-align: left;
    padding-left: 20px;
    font-size: 12px;
    width: 240px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .grid-table td {
    padding: 0;
    text-align: center;
    vertical-align: middle;
    border-bottom: 1px solid var(--border);
  }
  .grid-table tr:last-child td { border-bottom: none; }

  .grid-table td.habit-cell {
    text-align: left;
    padding: 12px 16px;
    background: var(--surface-alt);
    border-right: 1px solid var(--border);
  }
  .grid-table td.day-cell {
    height: 48px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }
  .grid-table td.day-cell:hover {
    background: var(--surface-alt);
  }
  .grid-table td.day-cell.today:hover {
    background: var(--surface-hover);
  }
  .grid-table td.day-cell.done {
    background: var(--done-bg);
  }
  .grid-table td.day-cell.done:hover {
    background: var(--done-bg-hover);
  }
  .grid-table td.day-cell.readonly { cursor: default; }
  .grid-table td.day-cell.readonly:hover { background: transparent; }
  .grid-table td.day-cell.readonly.today:hover { background: var(--today-accent); }
  .grid-table td.day-cell.readonly.done:hover { background: var(--done-bg); }

  .check-svg {
    width: 18px;
    height: 18px;
    pointer-events: none;
    stroke: var(--done-check);
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .day-header-num {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    display: block;
    letter-spacing: -0.02em;
  }
  .day-header-name {
    font-size: 10px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: block;
    margin-bottom: 3px;
    font-weight: 500;
  }

  .habit-cell-content {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: nowrap;
    min-width: 0;
  }
  .habit-name-text {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.005em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .habit-edit-btn {
    font-size: 11px;
    padding: 3px 8px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-soft);
    font-weight: 400;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .grid-table tr:hover .habit-edit-btn {
    opacity: 1;
  }
  .habit-edit-btn:hover {
    color: var(--text-muted);
    background: var(--surface);
    border-color: var(--border-med);
  }

  .badge-inline {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 100px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .badge-inline.streak {
    background: var(--streak-bg);
    color: var(--streak-text);
  }

  /* ===== Weekly habits ===== */
  .weekly-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .weekly-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px 16px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
  }
  .weekly-card:hover {
    box-shadow: var(--shadow-md);
  }

  .weekly-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: nowrap;
  }
  .weekly-name-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    min-width: 0;
    max-width: 40%;
  }
  .weekly-name {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.005em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .weekly-progress-wrap {
    flex: 1;
    min-width: 60px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-count {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 38px;
    text-align: right;
  }

  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 100px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge.streak { background: var(--streak-bg); color: var(--streak-text); }
  .badge.info { background: var(--info-bg); color: var(--info-text); }

  .progress-bar {
    height: 6px;
    background: var(--ring-track);
    border-radius: 100px;
    overflow: hidden;
    flex: 1;
    min-width: 40px;
  }
  .progress-fill {
    height: 100%;
    background: var(--ring-weekly);
    transition: width 0.4s ease;
    border-radius: 100px;
  }

  .weekly-actions {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
  }
  .weekly-actions button.small {
    font-size: 12px;
    padding: 5px 10px;
    min-width: 28px;
  }
  button.done-btn {
    background: var(--done-bg);
    color: var(--done-check);
    border-color: var(--done-bg);
  }
  button.done-btn:hover { background: var(--done-bg-hover); border-color: var(--done-bg-hover); }
  .weekly-card .habit-edit-btn {
    font-size: 11px;
    padding: 4px 8px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .weekly-card:hover .habit-edit-btn {
    opacity: 1;
  }

  /* ===== Section header ===== */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 2rem 0 12px;
  }
  .section-header h2 {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .empty-state {
    padding: 2rem 1.5rem;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    background: var(--surface);
    border: 1px dashed var(--border-med);
    border-radius: var(--radius-lg);
  }

  /* ===== Setup / Partner ===== */
  .setup-card {
    max-width: 440px;
    margin: 4rem auto;
    padding: 2.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-md);
  }
  .setup-card h2 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .info-banner {
    background: var(--info-bg);
    color: var(--info-text);
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .info-banner button {
    background: var(--info-text);
    color: var(--info-bg);
    border-color: var(--info-text);
    font-size: 12px;
    padding: 6px 12px;
  }

  .help-banner {
    background: var(--surface-alt);
    padding: 16px 20px;
    border-radius: var(--radius-lg);
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
    line-height: 1.65;
  }
  .help-banner strong { font-weight: 500; color: var(--text); }

  /* ===== Comments ===== */
  .comment-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
  }
  .comment-row {
    padding: 12px 0;
    border-top: 1px solid var(--border);
    font-size: 14px;
  }
  .comment-row:first-of-type { border-top: none; padding-top: 4px; }
  .comment-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    gap: 8px;
  }
  .comment-from {
    font-weight: 500;
    font-size: 13px;
    color: var(--text-muted);
  }
  .comment-from.received { color: var(--info-text); }
  .comment-time {
    font-size: 11px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  /* ===== Modal ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20,20,20,0.3);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
  }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-xl);
    padding: 2rem;
    max-width: 400px;
    width: 100%;
    border: 1px solid var(--border);
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  }
  .modal h3 {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 1.5rem;
    letter-spacing: -0.01em;
  }
  .modal-row { margin-bottom: 14px; }
  .modal-row label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 1.5rem;
  }

  /* ===== Responsive ===== */
  @media (max-width: 900px) {
    .rings-section { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .ring-card { padding: 14px; gap: 10px; }
    .ring-title { font-size: 15px; }
  }

  @media (max-width: 720px) {
    #app { padding: 1.5rem 1rem; }
    h1 { font-size: 24px; }
    .rings-section { grid-template-columns: 1fr; gap: 12px; }
    .ring-card { padding: 18px; gap: 16px; }
    .grid-table th.habit-col { width: 140px; padding-left: 14px; font-size: 11px; }
    .grid-table td.habit-cell { padding: 8px 12px; }
    .grid-table td.day-cell { height: 42px; }
    .habit-name-text { font-size: 13px; }
    .day-header-num { font-size: 14px; }
    .grid-table th { padding: 10px 2px; }
    .habit-edit-btn { opacity: 1; }
    .weekly-name-wrap { max-width: 45%; }
    .weekly-card .habit-edit-btn { opacity: 1; }
  }

  @media (max-width: 500px) {
    .ring-card { flex-direction: column; text-align: center; gap: 12px; }
    .ring-info { text-align: center; }
  }
</style>
</head>
<body>
<div id="app">
  <div style="text-align: center; padding: 2rem; color: var(--text-muted);">Loading...</div>
</div>

<div id="modal-container"></div>

<script>
(function() {
  const app = document.getElementById('app');
  const modalContainer = document.getElementById('modal-container');

  let state = {
    currentUser: null,
    users: {},
    view: 'me',
    weekOffset: 0,
    theme: 'light'
  };

  const STORAGE_KEY = 'habittracker_v3';

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        state.users = parsed.users || {};
        state.currentUser = parsed.currentUser || null;
        state.theme = parsed.theme || 'light';
      }
      // Migration from v2
      if (!state.currentUser || Object.keys(state.users).length === 0) {
        const oldRaw = localStorage.getItem('habittracker_v2');
        if (oldRaw) {
          const oldParsed = JSON.parse(oldRaw);
          if (oldParsed.users && Object.keys(oldParsed.users).length > 0) {
            state.users = oldParsed.users;
            state.currentUser = oldParsed.currentUser || null;
            saveState();
          }
        }
      }
      applyTheme();
    } catch (e) { console.error('Load failed:', e); }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        users: state.users,
        currentUser: state.currentUser,
        theme: state.theme
      }));
    } catch (e) { console.error('Save failed:', e); }
  }

  function applyTheme() {
    if (state.theme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
  }

  function toggleTheme() {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    applyTheme();
    saveState();
    render();
  }

  function todayStr() { return dateStr(new Date()); }
  function dateStr(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function mondayOf(d) {
    const result = new Date(d);
    const day = result.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    result.setDate(result.getDate() + diff);
    result.setHours(0,0,0,0);
    return result;
  }

  function getWeekDays() {
    const today = new Date();
    const monday = mondayOf(today);
    monday.setDate(monday.getDate() + (state.weekOffset * 7));
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(d.getDate() + i);
      days.push(d);
    }
    return days;
  }

  function weekKey(d) {
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dayNum = date.getUTCDay() || 7;
    date.setUTCDate(date.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
    const weekNo = Math.ceil((((date - yearStart) / 86400000) + 1)/7);
    return date.getUTCFullYear() + '-W' + String(weekNo).padStart(2,'0');
  }

  function currentWeekKey() {
    const days = getWeekDays();
    return weekKey(days[0]);
  }

  function daysAgo(n) { const d = new Date(); d.setDate(d.getDate()-n); return d; }

  function ensureUser(name) {
    if (!state.users[name]) {
      state.users[name] = { habits: [], checkins: {}, weekly: {}, comments: [], partner: null };
    }
    return state.users[name];
  }

  function dailyStreak(user, habitId) {
    let streak = 0;
    for (let i = 0; i < 365; i++) {
      const d = dateStr(daysAgo(i));
      if (user.checkins[habitId] && user.checkins[habitId][d]) {
        streak++;
      } else {
        if (i === 0) continue;
        break;
      }
    }
    return streak;
  }

  function weeklyProgress(user, habit) {
    const wk = currentWeekKey();
    const done = (user.weekly[habit.id] && user.weekly[habit.id][wk]) || 0;
    const target = habit.target || 1;
    return { done, target, pct: Math.min(100, Math.round((done / target) * 100)) };
  }

  function weeklyStreak(user, habit) {
    let streak = 0;
    const now = new Date();
    for (let i = 0; i < 52; i++) {
      const d = new Date(now);
      d.setDate(d.getDate() - i*7);
      const wk = weekKey(d);
      const done = (user.weekly[habit.id] && user.weekly[habit.id][wk]) || 0;
      const target = habit.target || 1;
      if (done >= target) {
        streak++;
      } else {
        if (i === 0) continue;
        break;
      }
    }
    return streak;
  }

  // Overall daily completion for the current week (all daily habits across all 7 days)
  function weekDailyCompletion(user) {
    const dailyHabits = user.habits.filter(h => h.type === 'daily');
    if (dailyHabits.length === 0) return { done: 0, total: 0, pct: 0 };
    const days = getWeekDays();
    const todayS = todayStr();
    // Only count days up through today for current week
    const isCurrentWeek = state.weekOffset === 0;
    let relevantDays = days;
    if (isCurrentWeek) {
      relevantDays = days.filter(d => dateStr(d) <= todayS);
    }
    const total = dailyHabits.length * relevantDays.length;
    let done = 0;
    dailyHabits.forEach(h => {
      relevantDays.forEach(d => {
        if (user.checkins[h.id] && user.checkins[h.id][dateStr(d)]) done++;
      });
    });
    return { done, total, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
  }

  function weekWeeklyCompletion(user) {
    const weeklyHabits = user.habits.filter(h => h.type === 'weekly');
    if (weeklyHabits.length === 0) return { done: 0, total: 0, pct: 0 };
    let totalTarget = 0;
    let totalDone = 0;
    weeklyHabits.forEach(h => {
      const p = weeklyProgress(user, h);
      totalTarget += p.target;
      totalDone += Math.min(p.done, p.target);
    });
    return {
      done: totalDone,
      total: totalTarget,
      pct: totalTarget > 0 ? Math.round((totalDone / totalTarget) * 100) : 0
    };
  }

  function weekTotalCompletion(user) {
    const dailyHabits = user.habits.filter(h => h.type === 'daily');
    const weeklyHabits = user.habits.filter(h => h.type === 'weekly');
    const days = getWeekDays();

    // Daily: each habit × 7 days this week
    let totalSlots = dailyHabits.length * 7;
    let doneSlots = 0;
    dailyHabits.forEach(h => {
      days.forEach(d => {
        if (user.checkins[h.id] && user.checkins[h.id][dateStr(d)]) doneSlots++;
      });
    });

    // Weekly: each habit's target count
    weeklyHabits.forEach(h => {
      const prog = weeklyProgress(user, h);
      totalSlots += prog.target;
      doneSlots += Math.min(prog.done, prog.target); // cap at target
    });

    return {
      done: doneSlots,
      total: totalSlots,
      pct: totalSlots > 0 ? Math.round((doneSlots / totalSlots) * 100) : 0
    };
  }

  function todayCompletion(user) {
    const dailyHabits = user.habits.filter(h => h.type === 'daily');
    const todayS = todayStr();
    const done = dailyHabits.filter(h => user.checkins[h.id] && user.checkins[h.id][todayS]).length;
    return {
      done,
      total: dailyHabits.length,
      pct: dailyHabits.length > 0 ? Math.round((done / dailyHabits.length) * 100) : 0
    };
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }

  function timeAgo(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins/60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs/24);
    return days + 'd ago';
  }

  function formatWeekLabel(days) {
    const first = days[0];
    const last = days[6];
    const sameMonth = first.getMonth() === last.getMonth();
    if (sameMonth) {
      return first.toLocaleDateString(undefined, { month: 'long' }) + ' ' + first.getDate() + ' – ' + last.getDate();
    }
    const monthFmt = { month: 'short', day: 'numeric' };
    return first.toLocaleDateString(undefined, monthFmt) + ' – ' + last.toLocaleDateString(undefined, monthFmt);
  }

  // SVG progress ring
  function renderRing(pct, color, size = 88, stroke = 8) {
    const radius = (size - stroke) / 2;
    const circumference = 2 * Math.PI * radius;
    const offset = circumference - (pct / 100) * circumference;
    return `
      <svg width="${size}" height="${size}" style="transform: rotate(-90deg);">
        <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="var(--ring-track)" stroke-width="${stroke}" />
        <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" style="transition: stroke-dashoffset 0.6s ease;" />
      </svg>
    `;
  }

  function showModal(title, bodyHtml, onSubmit) {
    modalContainer.innerHTML = `
      <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
          <h3>${escapeHtml(title)}</h3>
          ${bodyHtml}
          <div class="modal-actions">
            <button data-modal-cancel class="ghost">Cancel</button>
            <button class="primary" data-modal-submit>Save</button>
          </div>
        </div>
      </div>
    `;
    const firstInput = modalContainer.querySelector('input, select, textarea');
    if (firstInput) setTimeout(() => firstInput.focus(), 50);

    const overlay = document.getElementById('modal-overlay');
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal();
    });

    modalContainer.querySelector('[data-modal-cancel]').addEventListener('click', closeModal);
    modalContainer.querySelector('[data-modal-submit]').addEventListener('click', () => {
      if (onSubmit) onSubmit(modalContainer);
    });
    modalContainer.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
        e.preventDefault();
        if (onSubmit) onSubmit(modalContainer);
      }
      if (e.key === 'Escape') closeModal();
    });
  }

  function closeModal() { modalContainer.innerHTML = ''; }

  document.addEventListener('click', (e) => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;
    const arg = el.dataset.arg;
    const arg2 = el.dataset.arg2;
    const arg3 = el.dataset.arg3;

    const actions = {
      'create-user': createUser,
      'sign-in': () => signIn(arg),
      'switch-user': switchUser,
      'set-view': () => setView(arg),
      'add-habit': () => addHabit(arg),
      'edit-habit': () => editHabit(arg),
      'toggle-day': () => toggleDay(arg, arg2),
      'weekly-toggle': () => weeklyToggle(arg),
      'weekly-inc': () => weeklyInc(arg),
      'weekly-dec': () => weeklyDec(arg),
      'link-partner': linkPartner,
      'quick-link': () => quickLink(arg),
      'unlink-partner': unlinkPartner,
      'cheer-habit': () => cheerHabit(arg, arg2, arg3),
      'send-note': sendNote,
      'export-data': exportData,
      'import-data': importData,
      'toggle-theme': toggleTheme,
      'week-prev': () => { state.weekOffset--; render(); },
      'week-next': () => { state.weekOffset++; render(); },
      'week-current': () => { state.weekOffset = 0; render(); }
    };

    if (actions[action]) {
      e.preventDefault();
      actions[action]();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    if (e.target.id === 'new-username') { e.preventDefault(); createUser(); }
    if (e.target.id === 'partner-name') { e.preventDefault(); linkPartner(); }
    if (e.target.id === 'cheer-text') { e.preventDefault(); sendNote(); }
  });

  function render() {

      renderSetup();

    app.innerHTML = `

      </div>

      <div id="view-body"></div>
    `;

            <div style="display: flex; flex-wrap: wrap; gap: 6px;">

      <div class="rings-section">

            ${renderRing(totalComp.pct, 'var(--ring-total)', 76, 7)}

      ${!isMe ? `
        <div class="section-header" style="margin-top: 2.5rem;">
          <h2>Encouragement</h2>
        </div>
        ${renderComments(ownerName)}
      ` : ''}
    `;
  }

  function renderWeeklyHabit(user, habit, isMe, ownerName) {
    const prog = weeklyProgress(user, habit);
    const streak = weeklyStreak(user, habit);
    const isCountType = habit.target && habit.target > 1;

    return `
      <div class="weekly-card">
        <div class="weekly-row">
          <div class="weekly-name-wrap">
            <span class="weekly-name">${escapeHtml(habit.name)}</span>
            ${streak > 0 ? `<span class="badge streak">🔥 ${streak}</span>` : ''}
          </div>
          <div class="weekly-progress-wrap">
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${prog.pct}%;"></div>
            </div>
            <span class="progress-count">
              ${isCountType ? `${prog.done}/${prog.target}` : (prog.done >= 1 ? '✓ Done' : '—')}
            </span>
          </div>
          <div class="weekly-actions">
            ${isMe ? `
              ${isCountType ? `
                <button class="small" data-action="weekly-dec" data-arg="${habit.id}">−</button>
                <button class="small" data-action="weekly-inc" data-arg="${habit.id}">+</button>
              ` : `
                <button class="small ${prog.done >= 1 ? 'done-btn' : ''}" data-action="weekly-toggle" data-arg="${habit.id}">${prog.done >= 1 ? '✓' : 'Mark done'}</button>
              `}
              <button class="habit-edit-btn" data-action="edit-habit" data-arg="${habit.id}">Edit</button>
            ` : `
              <button class="small" data-action="cheer-habit" data-arg="${escapeHtml(ownerName)}" data-arg2="${habit.id}" data-arg3="${escapeHtml(habit.name)}">Cheer</button>
            `}
          </div>
        </div>
      </div>
    `;
  }

  function renderComments(partnerName) {
    const me = state.users[state.currentUser];
    const partner = state.users[partnerName];
    const allComments = [
      ...(me.comments || []).filter(c => c.to === partnerName).map(c => ({...c, direction: 'sent'})),
      ...(partner.comments || []).filter(c => c.to === state.currentUser).map(c => ({...c, direction: 'received'}))
    ].sort((a, b) => b.date - a.date).slice(0, 20);

    return `
      <div class="comment-card">
        <div style="display: flex; gap: 8px; margin-bottom: 14px;">
          <input type="text" id="cheer-text" placeholder="Send ${escapeHtml(partnerName)} a note..." autocomplete="off" />
          <button data-action="send-note">Send</button>
        </div>
        ${allComments.length ? allComments.map(c => `
          <div class="comment-row">
            <div class="comment-header">
              <span class="comment-from ${c.direction === 'received' ? 'received' : ''}">
                ${c.direction === 'received' ? escapeHtml(partnerName) : 'You'}${c.habitName ? ` · on "${escapeHtml(c.habitName)}"` : ''}
              </span>
              <span class="comment-time">${timeAgo(c.date)}</span>
            </div>
            <div>${escapeHtml(c.text)}</div>
          </div>
        `).join('') : '<p style="font-size: 13px; color: var(--text-muted); margin: 0; text-align: center; padding: 12px;">No notes yet. Send some encouragement!</p>'}
      </div>
    `;
  }

  function createUser() {
    const input = document.getElementById('new-username');
    const errorEl = document.getElementById('setup-error');
    if (!input) return;
    const name = (input.value || '').trim().toLowerCase().replace(/\s+/g, '-');
    if (!name || name.length < 2) {
      if (errorEl) errorEl.textContent = 'Pick a username (at least 2 characters)';
      return;
    }
    state.currentUser = name;
    ensureUser(name);
    saveState();
    render();
  }

  function signIn(name) {
    state.currentUser = name;
    ensureUser(name);
    saveState();
    render();
  }

  function switchUser() {
    state.currentUser = null;
    saveState();
    render();
  }

  function setView(v) { state.view = v; render(); }

  function addHabit(type) {
    const body = `
      <div class="modal-row">
        <label>Habit name</label>
        <input type="text" id="modal-habit-name" placeholder="e.g. Read 30 minutes" autocomplete="off" />
      </div>
      ${type === 'weekly' ? `
        <div class="modal-row">
          <label>Times per week</label>
          <input type="number" id="modal-habit-target" value="1" min="1" max="7" />
          <p style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">1 = simple done/not-done · 2+ = count target</p>
        </div>
      ` : ''}
    `;
    showModal(`New ${type} habit`, body, () => {
      const name = document.getElementById('modal-habit-name').value.trim();
      if (!name) return;
      let target = 1;
      if (type === 'weekly') {
        target = parseInt(document.getElementById('modal-habit-target').value) || 1;
      }
      const user = state.users[state.currentUser];
      user.habits.push({
        id: 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        name, type, target,
        created: Date.now()
      });
      saveState();
      closeModal();
      render();
    });
  }

  function editHabit(id) {
    const user = state.users[state.currentUser];
    const h = user.habits.find(x => x.id === id);
    if (!h) return;

    const body = `
      <div class="modal-row">
        <label>Name</label>
        <input type="text" id="modal-edit-name" value="${escapeHtml(h.name)}" autocomplete="off" />
      </div>
      ${h.type === 'weekly' ? `
        <div class="modal-row">
          <label>Weekly target</label>
          <input type="number" id="modal-edit-target" value="${h.target || 1}" min="1" max="7" />
        </div>
      ` : ''}
      <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);">
        <button data-modal-delete style="color: var(--danger); border-color: rgba(181,78,78,0.3); font-size: 12px;">Delete this habit</button>
      </div>
    `;
    showModal(`Edit habit`, body, () => {
      const name = document.getElementById('modal-edit-name').value.trim();
      if (name) h.name = name;
      if (h.type === 'weekly') {
        const t = parseInt(document.getElementById('modal-edit-target').value);
        if (t) h.target = Math.max(1, t);
      }
      saveState();
      closeModal();
      render();
    });

    const delBtn = modalContainer.querySelector('[data-modal-delete]');
    if (delBtn) {
      delBtn.addEventListener('click', () => {
        if (confirm(`Delete "${h.name}" and all its history?`)) {
          user.habits = user.habits.filter(x => x.id !== id);
          delete user.checkins[id];
          delete user.weekly[id];
          saveState();
          closeModal();
          render();
        }
      });
    }
  }

  function toggleDay(habitId, dateString) {
    const user = state.users[state.currentUser];
    if (!user.checkins[habitId]) user.checkins[habitId] = {};
    if (user.checkins[habitId][dateString]) {
      delete user.checkins[habitId][dateString];
    } else {
      user.checkins[habitId][dateString] = true;
    }
    saveState();
    render();
  }

  function weeklyToggle(id) {
    const user = state.users[state.currentUser];
    const wk = currentWeekKey();
    if (!user.weekly[id]) user.weekly[id] = {};
    user.weekly[id][wk] = user.weekly[id][wk] >= 1 ? 0 : 1;
    saveState();
    render();
  }

  function weeklyInc(id) {
    const user = state.users[state.currentUser];
    const wk = currentWeekKey();
    if (!user.weekly[id]) user.weekly[id] = {};
    user.weekly[id][wk] = (user.weekly[id][wk] || 0) + 1;
    saveState();
    render();
  }

  function weeklyDec(id) {
    const user = state.users[state.currentUser];
    const wk = currentWeekKey();
    if (!user.weekly[id]) user.weekly[id] = {};
    user.weekly[id][wk] = Math.max(0, (user.weekly[id][wk] || 0) - 1);
    saveState();
    render();
  }

  function linkPartner() {
    const input = document.getElementById('partner-name');
    if (!input) return;
    const name = (input.value || '').trim().toLowerCase().replace(/\s+/g, '-');
    if (!name) return;
    if (name === state.currentUser) { alert("Can't partner with yourself!"); return; }
    if (!state.users[name]) {
      if (!confirm(`No user "${name}" exists yet. Link anyway? They can sign up later.`)) return;
      ensureUser(name);
    }
    state.users[state.currentUser].partner = name;
    if (state.users[name] && !state.users[name].partner) {
      state.users[name].partner = state.currentUser;
    }
    saveState();
    render();
  }

  function quickLink(name) {
    state.users[state.currentUser].partner = name;
    if (!state.users[name].partner) {
      state.users[name].partner = state.currentUser;
    }
    saveState();
    render();
  }

  function unlinkPartner() {
    state.users[state.currentUser].partner = null;
    saveState();
    render();
  }

  function cheerHabit(ownerName, habitId, habitName) {
    const body = `
      <div class="modal-row">
        <label>Your note about "${escapeHtml(habitName)}"</label>
        <input type="text" id="modal-cheer-text" placeholder="Keep it up!" autocomplete="off" />
      </div>
    `;
    showModal(`Send encouragement`, body, () => {
      const text = document.getElementById('modal-cheer-text').value.trim();
      if (!text) return;
      const me = state.users[state.currentUser];
      me.comments = me.comments || [];
      me.comments.push({
        id: 'c_' + Date.now(),
        from: state.currentUser,
        to: ownerName,
        habitId, habitName,
        text,
        date: Date.now()
      });
      saveState();
      closeModal();
      render();
    });
  }

  function sendNote() {
    const input = document.getElementById('cheer-text');
    if (!input) return;
    const text = (input.value || '').trim();
    if (!text) return;
    const me = state.users[state.currentUser];
    const partner = me.partner;
    if (!partner) return;
    me.comments = me.comments || [];
    me.comments.push({
      id: 'c_' + Date.now(),
      from: state.currentUser,
      to: partner,
      text,
      date: Date.now()
    });
    saveState();
    render();
  }

  function exportData() {
    const data = JSON.stringify({ users: state.users, exported: Date.now() }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `habits-${state.currentUser}-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const parsed = JSON.parse(ev.target.result);
          if (!parsed.users) { alert('Invalid file'); return; }
          if (!confirm('Merge imported data? Existing users with the same name will be overwritten.')) return;
          Object.assign(state.users, parsed.users);
          saveState();
          render();
          alert('Imported successfully!');
        } catch (err) {
          alert('Failed to parse file: ' + err.message);
        }
      };
      reader.readAsText(file);
    });
    input.click();
  }

  loadState();
  render();
})();
</script>
</body>
</html>
