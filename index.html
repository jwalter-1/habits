<html lang="en">
<head>
<meta charset="UTF-8">

<title>Habits</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    color-scheme: light;
    --bg: #fcfbf8;
    --surface: #ffffff;
    --surface-alt: #f7f5f0;
    --surface-hover: #f0ede5;
    --border: rgba(20,20,20,0.06);
    --border-med: rgba(20,20,20,0.1);
    --text: #1f1d1a;
    --text-muted: #7c7973;
    --text-soft: #aba89f;
    --accent: #8b7a5a;
    --accent-soft: #e8e0d0;
    --ring-track: #ece9e2;
    --ring-daily: #a8c98a;
    --ring-daily-soft: #e8f0db;
    --ring-weekly: #a7b8d4;
    --ring-weekly-soft: #dfe5ef;
    --ring-total: #d4a78a;
    --ring-total-soft: #f0e0d0;
    --done-bg: #d9e8c6;
    --done-bg-hover: #c7dbb0;
    --done-check: #5a7a3a;
    --streak-bg: #f5e9d1;
    --streak-text: #8a6c2a;
    --info-bg: #e3ecf5;
    --info-text: #4a6b8f;
    --today-accent: #f5ead4;
    --danger: #b54e4e;
    --shadow-sm: 0 1px 2px rgba(20,20,20,0.03);
    --shadow-md: 0 2px 8px rgba(20,20,20,0.04);
    --radius: 10px;
    --radius-lg: 16px;
    --radius-xl: 20px;
  }

  html[data-theme="dark"] {
    color-scheme: dark;
    --bg: #18171a;
    --surface: #232226;
    --surface-alt: #2a292d;
    --surface-hover: #33323a;
    --border: rgba(255,255,255,0.06);
    --border-med: rgba(255,255,255,0.1);
    --text: #eeeae0;
    --text-muted: #9a9690;
    --text-soft: #63605a;
    --accent: #c4b088;
    --accent-soft: #3a342a;
    --ring-track: #32313a;
    --ring-daily: #8bac6e;
    --ring-daily-soft: #2d3a22;
    --ring-weekly: #7d94b5;
    --ring-weekly-soft: #222a38;
    --ring-total: #b88968;
    --ring-total-soft: #3a2c20;
    --done-bg: #3d4f2d;
    --done-bg-hover: #4a6038;
    --done-check: #c8e0a8;
    --streak-bg: #4a3f28;
    --streak-text: #e0c688;
    --info-bg: #283340;
    --info-text: #a3bcd8;
    --today-accent: #403824;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.15);
    --shadow-md: 0 2px 8px rgba(0,0,0,0.2);
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 0;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  #app {
    max-width: 1080px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  h1 { font-size: 28px; font-weight: 500; margin: 0; letter-spacing: -0.02em; }
  h2 { font-size: 17px; font-weight: 500; margin: 0; letter-spacing: -0.01em; }
  p { margin: 0; }

  button {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border-med);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: -0.005em;
  }
  button:hover { background: var(--surface-hover); border-color: var(--border-med); }
  button:active { transform: scale(0.97); }
  button.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  button.primary:hover { opacity: 0.88; background: var(--text); }
  button.ghost { background: transparent; border-color: transparent; color: var(--text-muted); }
  button.ghost:hover { background: var(--surface-alt); color: var(--text); }

  .theme-toggle {
    width: 36px; height: 36px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border-med);
    color: var(--text-muted);
  }
  .theme-toggle:hover { background: var(--surface-hover); color: var(--text); }
  .theme-toggle svg {
    width: 16px; height: 16px;
    stroke: currentColor; stroke-width: 2; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
  }

  input[type="text"], input[type="number"] {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border-med);
    border-radius: var(--radius);
    width: 100%;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .header-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 2rem; flex-wrap: wrap; gap: 16px;
  }
  .user-info { font-size: 13px; color: var(--text-muted); margin-top: 6px; font-weight: 400; }
  .user-info strong { font-weight: 500; color: var(--text); }
  .header-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .sync-indicator {
    font-size: 11px;
    color: var(--text-soft);
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 0 8px;
  }
  .sync-indicator.syncing { color: var(--accent); }
  .sync-indicator.error { color: var(--danger); }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
  }
  .sync-indicator.syncing .sync-dot {
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .tabs {
    display: flex; gap: 2px; margin-bottom: 2rem;
    background: var(--surface-alt);
    padding: 4px;
    border-radius: var(--radius);
    width: fit-content;
  }
  .tab-btn {
    padding: 8px 16px; font-size: 13px; font-weight: 500;
    background: transparent; border: none;
    color: var(--text-muted);
    border-radius: 7px; cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); background: transparent; }
  .tab-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }

  .rings-section {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 2rem;
  }
  .ring-card {
    background: var(--surface);
    border-radius: var(--radius-xl);
    padding: 18px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .ring-wrap { position: relative; flex-shrink: 0; }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .ring-pct { font-size: 20px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; }
  .ring-pct-sub { font-size: 9px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .ring-info { flex: 1; min-width: 0; }
  .ring-label { font-size: 10px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; }
  .ring-title { font-size: 16px; font-weight: 500; margin-top: 3px; letter-spacing: -0.01em; }
  .ring-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .ring-accent-streak {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 3px 8px;
    background: var(--streak-bg); color: var(--streak-text);
    border-radius: 100px; margin-top: 8px; font-weight: 500;
  }

  .week-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; padding: 6px;
  }
  .week-label-wrap { text-align: center; }
  .week-label { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; }
  .week-sub { font-size: 11px; color: var(--text-soft); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.08em; }
  .week-nav-btn {
    width: 32px; height: 32px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--border-med);
    color: var(--text-muted);
  }
  .week-nav-btn:hover { color: var(--text); background: var(--surface); }
  .week-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .grid-wrapper {
    background: var(--surface);
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    margin-bottom: 2rem;
  }
  .grid-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .grid-table th {
    background: var(--surface-alt);
    font-weight: 500; font-size: 11px;
    color: var(--text-muted);
    padding: 14px 4px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .grid-table th.today, .grid-table td.today { background: var(--today-accent); }
  .grid-table th.habit-col {
    text-align: left; padding-left: 20px;
    font-size: 12px; width: 280px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .grid-table td {
    padding: 0; text-align: center; vertical-align: middle;
    border-bottom: 1px solid var(--border);
  }
  .grid-table tr:last-child td { border-bottom: none; }
  .grid-table td.habit-cell {
    text-align: left; padding: 12px 16px;
    background: var(--surface-alt);
    border-right: 1px solid var(--border);
  }
  .grid-table td.day-cell {
    height: 48px; cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }
  .grid-table td.day-cell:hover { background: var(--surface-alt); }
  .grid-table td.day-cell.today:hover { background: var(--surface-hover); }
  .grid-table td.day-cell.done { background: var(--done-bg); }
  .grid-table td.day-cell.done:hover { background: var(--done-bg-hover); }
  .grid-table td.day-cell.readonly { cursor: default; }
  .grid-table td.day-cell.readonly:hover { background: transparent; }
  .grid-table td.day-cell.readonly.today:hover { background: var(--today-accent); }
  .grid-table td.day-cell.readonly.done:hover { background: var(--done-bg); }

  .check-svg {
    width: 18px; height: 18px; pointer-events: none;
    stroke: var(--done-check);
    stroke-width: 2.5; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
  }

  .day-header-num { font-size: 16px; font-weight: 500; color: var(--text); display: block; letter-spacing: -0.02em; }
  .day-header-name { font-size: 10px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 3px; font-weight: 500; }

  .habit-cell-content {
    display: flex; align-items: center;
    gap: 8px; flex-wrap: nowrap; min-width: 0;
  }
  .habit-name-text {
    font-size: 14px; font-weight: 500;
    letter-spacing: -0.005em;
    flex: 1; min-width: 0;
    line-height: 1.3;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .habit-edit-btn {
    font-size: 11px; padding: 3px 8px;
    background: transparent; border: 1px solid transparent;
    color: var(--text-soft); font-weight: 400;
    flex-shrink: 0; opacity: 0; transition: opacity 0.15s;
  }
  .grid-table tr:hover .habit-edit-btn { opacity: 1; }
  .habit-edit-btn:hover {
    color: var(--text-muted);
    background: var(--surface);
    border-color: var(--border-med);
  }

  .badge-inline {
    font-size: 10px; padding: 2px 8px;
    border-radius: 100px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .badge-inline.streak { background: var(--streak-bg); color: var(--streak-text); }

  /* Drag and drop */
  .drag-handle {
    cursor: grab;
    color: var(--text-soft);
    padding: 2px 4px;
    margin-right: 2px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    user-select: none;
    flex-shrink: 0;
    font-size: 14px;
    line-height: 1;
  }
  .grid-table tr:hover .drag-handle,
  .weekly-card:hover .drag-handle {
    opacity: 0.6;
  }
  .drag-handle:hover {
    opacity: 1 !important;
    color: var(--text-muted);
  }
  .drag-handle:active { cursor: grabbing; }

  tr.dragging, .weekly-card.dragging {
    opacity: 0.4;
  }
  tr.drag-over-above > td:first-child {
    box-shadow: 0 -2px 0 var(--accent) inset;
  }
  tr.drag-over-below > td:first-child {
    box-shadow: 0 2px 0 var(--accent) inset;
  }
  .weekly-card.drag-over-above {
    border-top: 2px solid var(--accent);
  }
  .weekly-card.drag-over-below {
    border-bottom: 2px solid var(--accent);
  }

  /* ===== Mobile card view for daily habits ===== */
  .mobile-daily-list {
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 2rem;
  }
  .mobile-habit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
  }
  .mobile-habit-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    min-width: 0;
  }
  .mobile-habit-name {
    font-size: 15px;
    font-weight: 500;
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.005em;
  }
  .mobile-dots-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .mobile-dot-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 2px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s;
  }
  .mobile-dot-cell:hover {
    background: var(--surface-alt);
  }
  .mobile-dot-cell.today {
    background: var(--today-accent);
  }
  .mobile-dot-cell.readonly {
    cursor: default;
  }
  .mobile-dot-cell.readonly:hover {
    background: transparent;
  }
  .mobile-dot-cell.readonly.today:hover {
    background: var(--today-accent);
  }
  .mobile-dot-label {
    font-size: 10px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .mobile-dot-cell.today .mobile-dot-label {
    color: var(--text-muted);
  }
  .mobile-dot-num {
    font-size: 11px;
    color: var(--text-soft);
    font-weight: 500;
    margin-bottom: 2px;
  }
  .mobile-dot-cell.today .mobile-dot-num {
    color: var(--text);
  }
  .mobile-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--surface-alt);
    border: 1.5px solid var(--border-med);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }
  .mobile-dot.done {
    background: var(--done-bg);
    border-color: var(--done-check);
  }
  .mobile-dot-cell.today .mobile-dot {
    width: 28px;
    height: 28px;
    border-width: 2px;
    border-color: var(--text-muted);
  }
  .mobile-dot-cell.today .mobile-dot.done {
    border-color: var(--done-check);
  }
  .mobile-dot-check {
    width: 12px;
    height: 12px;
    stroke: var(--done-check);
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }
  .mobile-dot-cell.today .mobile-dot-check {
    width: 14px;
    height: 14px;
  }

  @media (max-width: 720px) {
    /* Hide desktop grid on mobile */
    .grid-wrapper { display: none; }
    /* Show mobile card list instead */
    .mobile-daily-list { display: flex; }

    /* Completely break out of desktop grid layout on mobile */
    .weekly-list {
      display: block !important;
      grid-template-columns: none !important;
      gap: 0 !important;
    }
    .weekly-card {
      display: block !important;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 8px;
      width: 100%;
    }
    .weekly-name-cell,
    .weekly-progress-cell,
    .weekly-actions-cell {
      background: transparent !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      width: 100%;
    }
    .weekly-card > .weekly-name-cell {
      display: flex !important;
      align-items: center;
      gap: 8px;
      padding: 0 0 10px 0 !important;
    }
    .weekly-card > .weekly-progress-cell {
      display: flex !important;
      align-items: center;
      gap: 10px;
      padding: 0 0 10px 0 !important;
    }
    .weekly-card > .weekly-actions-cell {
      display: flex !important;
      justify-content: flex-end;
      gap: 6px;
      padding: 0 !important;
    }
    .weekly-name { font-size: 15px; }
    .weekly-card .habit-edit-btn { opacity: 1; font-size: 12px; }
    .weekly-actions-cell button.small {
      font-size: 13px;
      padding: 7px 14px;
      min-width: 36px;
    }
  }

  .weekly-list {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px 0;
    align-items: center;
  }
  .weekly-card {
    display: contents;
  }
  .weekly-card-inner {
    display: contents;
  }
  /* Each weekly-card contributes 3 cells to the parent grid */
  .weekly-name-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: var(--radius-lg) 0 0 var(--radius-lg);
    padding: 14px 4px 14px 16px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .weekly-progress-cell {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .weekly-actions-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: none;
    border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
    padding: 14px 16px 14px 8px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    min-width: 160px;
    justify-content: flex-end;
  }
  .weekly-card:hover .weekly-name-cell,
  .weekly-card:hover .weekly-progress-cell,
  .weekly-card:hover .weekly-actions-cell {
    box-shadow: var(--shadow-md);
  }
  .weekly-name {
    font-size: 14px; font-weight: 500; letter-spacing: -0.005em;
    line-height: 1.3;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .progress-count {
    font-size: 12px; color: var(--text-muted);
    font-weight: 500; white-space: nowrap;
    flex-shrink: 0; min-width: 38px; text-align: right;
  }
  .progress-bar {
    height: 6px;
    background: var(--ring-track);
    border-radius: 100px;
    overflow: hidden;
    flex: 1; min-width: 40px;
  }
  .progress-fill {
    height: 100%;
    background: var(--ring-weekly);
    transition: width 0.4s ease;
    border-radius: 100px;
  }

<div id="app"></div>
<div id="modal-container"></div>

<script>
(function() {
  // ===== SUPABASE CONFIG =====
  const SUPABASE_URL = 'https://bghjdbiypgivlzyfyvxn.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnaGpkYml5cGdpdmx6eWZ5dnhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0Mzc1NDcsImV4cCI6MjA5MjAxMzU0N30.2tkuoDlxPf4LZDzkraoOQcckceUCil6HEGdq6xaKRoA';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const app = document.getElementById('app');
  const modalContainer = document.getElementById('modal-container');
  const loadingOverlay = document.getElementById('loading-overlay');

  let state = {
    currentUser: null,
    users: {},
    view: 'me',
    weekOffset: 0,
    theme: 'light',
    syncStatus: 'idle',
    lastError: null
  };

  // ===== LOCAL PREFS (username + theme) =====
  const LOCAL_PREFS_KEY = 'habittracker_prefs_v1';

  function loadLocalPrefs() {
    try {
      const raw = localStorage.getItem(LOCAL_PREFS_KEY);
      if (raw) {
        const p = JSON.parse(raw);
        state.currentUser = p.currentUser || null;
        state.theme = p.theme || 'light';
      }
    } catch (e) {}
  }

  function saveLocalPrefs() {
    try {
      localStorage.setItem(LOCAL_PREFS_KEY, JSON.stringify({
        currentUser: state.currentUser,
        theme: state.theme
      }));
    } catch (e) {}
  }

  function applyTheme() {
    if (state.theme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
  }

  function toggleTheme() {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    applyTheme();
    saveLocalPrefs();
    render();
  }

  // ===== SUPABASE DATA LAYER =====
  function setSync(status, error) {
    state.syncStatus = status;
    state.lastError = error || null;
    updateSyncIndicator();
  }

  function updateSyncIndicator() {
    const el = document.getElementById('sync-indicator');
    if (!el) return;
    el.className = 'sync-indicator ' + (state.syncStatus === 'syncing' ? 'syncing' : state.syncStatus === 'error' ? 'error' : '');
    el.innerHTML = state.syncStatus === 'syncing'
      ? '<span class="sync-dot"></span>Syncing...'
      : state.syncStatus === 'error'
      ? '<span class="sync-dot"></span>Offline'
      : '<span class="sync-dot"></span>Synced';
  }

  async function loadAllData() {
    setSync('syncing');
    try {
      // Load all users, habits, checkins, weekly progress, comments
      const [usersR, habitsR, checkinsR, weeklyR, commentsR] = await Promise.all([
        sb.from('users').select('*'),
        sb.from('habits').select('*'),
        sb.from('checkins').select('*'),
        sb.from('weekly_progress').select('*'),
        sb.from('comments').select('*')
      ]);

      if (usersR.error) throw usersR.error;
      if (habitsR.error) throw habitsR.error;
      if (checkinsR.error) throw checkinsR.error;
      if (weeklyR.error) throw weeklyR.error;
      if (commentsR.error) throw commentsR.error;

      // Rebuild state.users from flat tables
      state.users = {};
      (usersR.data || []).forEach(u => {
        state.users[u.username] = {
          habits: [],
          checkins: {},
          weekly: {},
          comments: [],
          partner: u.partner
        };
      });

      (habitsR.data || []).forEach(h => {
        const u = state.users[h.username];
        if (u) u.habits.push({
          id: h.id,
          name: h.name,
          type: h.type,
          target: h.target,
          sort_order: h.sort_order || 0,
          created: new Date(h.created_at).getTime()
        });
      });

      // Sort habits by sort_order within each user
      Object.values(state.users).forEach(u => {
        u.habits.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
      });

      (checkinsR.data || []).forEach(c => {
        // find habit owner
        const habit = (habitsR.data || []).find(h => h.id === c.habit_id);
        if (!habit) return;
        const u = state.users[habit.username];
        if (!u) return;
        if (!u.checkins[c.habit_id]) u.checkins[c.habit_id] = {};
        u.checkins[c.habit_id][c.date] = true;
      });

      (weeklyR.data || []).forEach(w => {
        const habit = (habitsR.data || []).find(h => h.id === w.habit_id);
        if (!habit) return;
        const u = state.users[habit.username];
        if (!u) return;
        if (!u.weekly[w.habit_id]) u.weekly[w.habit_id] = {};
        u.weekly[w.habit_id][w.week] = w.count;
      });

      (commentsR.data || []).forEach(c => {
        const u = state.users[c.from_user];
        if (!u) return;
        u.comments.push({
          id: c.id,
          from: c.from_user,
          to: c.to_user,
          habitId: c.habit_id,
          habitName: c.habit_name,
          text: c.text,
          date: new Date(c.created_at).getTime()
        });
      });

      setSync('idle');
    } catch (err) {
      console.error('Load failed:', err);
      setSync('error', err.message);
    }
  }

  async function dbUpsertUser(username) {
    const { error } = await sb.from('users').upsert({ username }, { onConflict: 'username' });
    if (error) throw error;
  }

  async function dbUpdateUserPartner(username, partner) {
    const { error } = await sb.from('users').update({ partner }).eq('username', username);
    if (error) throw error;
  }

  async function dbInsertHabit(habit, username) {
    const { error } = await sb.from('habits').insert({
      id: habit.id,
      username,
      name: habit.name,
      type: habit.type,
      target: habit.target,
      sort_order: habit.sort_order || 0
    });
    if (error) throw error;
  }

  async function dbUpdateHabit(habit) {
    const { error } = await sb.from('habits').update({
      name: habit.name,
      target: habit.target
    }).eq('id', habit.id);
    if (error) throw error;
  }

  async function dbDeleteHabit(habitId) {
    const { error } = await sb.from('habits').delete().eq('id', habitId);
    if (error) throw error;
  }

  async function dbUpdateSortOrders(habits) {
    // Update each habit's sort_order in parallel
    const updates = habits.map((h, idx) =>
      sb.from('habits').update({ sort_order: idx * 1000 }).eq('id', h.id)
    );
    const results = await Promise.all(updates);
    const firstError = results.find(r => r.error);
    if (firstError) throw firstError.error;
  }

  async function dbInsertCheckin(habitId, date) {
    const { error } = await sb.from('checkins').upsert({ habit_id: habitId, date }, { onConflict: 'habit_id,date' });
    if (error) throw error;
  }

  async function dbDeleteCheckin(habitId, date) {
    const { error } = await sb.from('checkins').delete().eq('habit_id', habitId).eq('date', date);
    if (error) throw error;
  }

  async function dbUpsertWeekly(habitId, week, count) {
    const { error } = await sb.from('weekly_progress').upsert({
      habit_id: habitId, week, count, updated_at: new Date().toISOString()
    }, { onConflict: 'habit_id,week' });
    if (error) throw error;
  }

  async function dbInsertComment(comment) {
    const { error } = await sb.from('comments').insert({
      id: comment.id,
      from_user: comment.from,
      to_user: comment.to,
      habit_id: comment.habitId || null,
      habit_name: comment.habitName || null,
      text: comment.text
    });
    if (error) throw error;
  }

  // Wrapper that shows sync status and handles errors gracefully
  let syncInFlight = false;
  async function withSync(fn) {
    if (syncInFlight) {
      console.log('Sync already in progress, ignoring duplicate request');
      return;
    }
    syncInFlight = true;
    setSync('syncing');
    try {
      await fn();
      setSync('idle');
    } catch (err) {
      console.error('Sync error:', err);
      setSync('error', err.message);
      alert('Error saving: ' + err.message + '\n\nPlease try again.');
    } finally {
      syncInFlight = false;
    }
  }

  // ===== DATE HELPERS =====
  function todayStr() { return dateStr(new Date()); }
  function dateStr(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function mondayOf(d) {
    const r = new Date(d);
    const day = r.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    r.setDate(r.getDate() + diff);
    r.setHours(0,0,0,0);
    return r;
  }
  function getWeekDays() {
    const today = new Date();
    const monday = mondayOf(today);
    monday.setDate(monday.getDate() + (state.weekOffset * 7));
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(d.getDate() + i);
      days.push(d);
    }
    return days;
  }
  function weekKey(d) {
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dayNum = date.getUTCDay() || 7;
    date.setUTCDate(date.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
    const weekNo = Math.ceil((((date - yearStart) / 86400000) + 1)/7);
    return date.getUTCFullYear() + '-W' + String(weekNo).padStart(2,'0');
  }
  function currentWeekKey() { return weekKey(getWeekDays()[0]); }
  function daysAgo(n) { const d = new Date(); d.setDate(d.getDate()-n); return d; }

  function ensureUser(name) {
    if (!state.users[name]) {
      state.users[name] = { habits: [], checkins: {}, weekly: {}, comments: [], partner: null };
    }
    return state.users[name];
  }

  // ===== STATS =====
  function dailyStreak(user, habitId) {
    let streak = 0;
    for (let i = 0; i < 365; i++) {
      const d = dateStr(daysAgo(i));
      if (user.checkins[habitId] && user.checkins[habitId][d]) streak++;
      else { if (i === 0) continue; break; }
    }
    return streak;
  }

  function weeklyProgress(user, habit) {
    const wk = currentWeekKey();
    const done = (user.weekly[habit.id] && user.weekly[habit.id][wk]) || 0;
    const target = habit.target || 1;
    return { done, target, pct: Math.min(100, Math.round((done / target) * 100)) };
  }

  function weeklyStreak(user, habit) {
    let streak = 0;
    const now = new Date();
    for (let i = 0; i < 52; i++) {
      const d = new Date(now); d.setDate(d.getDate() - i*7);
      const wk = weekKey(d);
      const done = (user.weekly[habit.id] && user.weekly[habit.id][wk]) || 0;
      const target = habit.target || 1;
      if (done >= target) streak++;
      else { if (i === 0) continue; break; }
    }
    return streak;
  }

  function weekTotalCompletion(user) {
    const dailyHabits = user.habits.filter(h => h.type === 'daily');
    const weeklyHabits = user.habits.filter(h => h.type === 'weekly');
    const days = getWeekDays();
    let totalSlots = dailyHabits.length * 7;
    let doneSlots = 0;
    dailyHabits.forEach(h => {
      days.forEach(d => {
        if (user.checkins[h.id] && user.checkins[h.id][dateStr(d)]) doneSlots++;
      });
    });
    weeklyHabits.forEach(h => {
      const prog = weeklyProgress(user, h);
      totalSlots += prog.target;
      doneSlots += Math.min(prog.done, prog.target);
    });
    return { done: doneSlots, total: totalSlots, pct: totalSlots > 0 ? Math.round((doneSlots / totalSlots) * 100) : 0 };
  }

  function todayCompletion(user) {
    const dailyHabits = user.habits.filter(h => h.type === 'daily');
    const todayS = todayStr();
    const done = dailyHabits.filter(h => user.checkins[h.id] && user.checkins[h.id][todayS]).length;
    return { done, total: dailyHabits.length, pct: dailyHabits.length > 0 ? Math.round((done / dailyHabits.length) * 100) : 0 };
  }

  function weekWeeklyCompletion(user) {
    const weeklyHabits = user.habits.filter(h => h.type === 'weekly');
    if (weeklyHabits.length === 0) return { done: 0, total: 0, pct: 0 };
    let totalTarget = 0, totalDone = 0;
    weeklyHabits.forEach(h => {
      const p = weeklyProgress(user, h);
      totalTarget += p.target;
      totalDone += Math.min(p.done, p.target);
    });
    return { done: totalDone, total: totalTarget, pct: totalTarget > 0 ? Math.round((totalDone / totalTarget) * 100) : 0 };
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }

  function timeAgo(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins/60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs/24);
    return days + 'd ago';
  }

  function formatWeekLabel(days) {
    const first = days[0], last = days[6];
    const sameMonth = first.getMonth() === last.getMonth();
    if (sameMonth) return first.toLocaleDateString(undefined, { month: 'long' }) + ' ' + first.getDate() + ' – ' + last.getDate();
    const fmt = { month: 'short', day: 'numeric' };
    return first.toLocaleDateString(undefined, fmt) + ' – ' + last.toLocaleDateString(undefined, fmt);
  }

  function renderRing(pct, color, size = 88, stroke = 8) {
    const radius = (size - stroke) / 2;
    const circumference = 2 * Math.PI * radius;
    const offset = circumference - (pct / 100) * circumference;
    return `
      <svg width="${size}" height="${size}" style="transform: rotate(-90deg);">
        <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="var(--ring-track)" stroke-width="${stroke}" />
        <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" style="transition: stroke-dashoffset 0.6s ease;" />
      </svg>
    `;
  }


  function renderMiniRing(done, total, color, size, stroke) {
    size = size || 32;
    stroke = stroke || 3.5;
    var pct = total === 0 ? 0 : Math.round((done / total) * 100);
    var radius = (size - stroke) / 2;
    var circumference = 2 * Math.PI * radius;
    var offset = circumference - (pct / 100) * circumference;
    return '<div class="mini-ring-wrap" title="' + done + ' / ' + total + '">' +
      '<svg width="' + size + '" height="' + size + '" style="transform: rotate(-90deg);">' +
        '<circle cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + radius + '" fill="none" stroke="var(--ring-track)" stroke-width="' + stroke + '" />' +
        '<circle cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + radius + '" fill="none" stroke="' + color + '" stroke-width="' + stroke + '" stroke-linecap="round" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '" style="transition: stroke-dashoffset 0.6s ease;" />' +
      '</svg>' +
      '<span class="mini-ring-label">' + done + '</span>' +
    '</div>';
  }

  function showModal(title, bodyHtml, onSubmit) {
    modalContainer.innerHTML = `
      <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
          <h3>${escapeHtml(title)}</h3>
          ${bodyHtml}
          <div class="modal-actions">
            <button data-modal-cancel class="ghost">Cancel</button>
            <button class="primary" data-modal-submit>Save</button>
          </div>
        </div>
      </div>
    `;
    const firstInput = modalContainer.querySelector('input, select, textarea');
    if (firstInput) setTimeout(() => firstInput.focus(), 50);
    const overlay = document.getElementById('modal-overlay');
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
    modalContainer.querySelector('[data-modal-cancel]').addEventListener('click', closeModal);

    const submitBtn = modalContainer.querySelector('[data-modal-submit]');
    let submitting = false;
    const handleSubmit = async () => {
      if (submitting) return;
      submitting = true;
      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.5';
      submitBtn.style.cursor = 'wait';
      submitBtn.textContent = 'Saving...';
      try {
        if (onSubmit) await onSubmit(modalContainer);
      } finally {
        submitting = false;
        // If modal is still open (e.g., validation failed), re-enable button
        if (document.getElementById('modal-overlay') && submitBtn) {
          submitBtn.disabled = false;
          submitBtn.style.opacity = '';
          submitBtn.style.cursor = '';
          submitBtn.textContent = 'Save';
        }
      }
    };
    submitBtn.addEventListener('click', handleSubmit);
    modalContainer.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.tagName === 'INPUT' && !submitting) {
        e.preventDefault();
        handleSubmit();
      }
      if (e.key === 'Escape') closeModal();
    });
  }
  function closeModal() { modalContainer.innerHTML = ''; }

  document.addEventListener('click', (e) => {

    if (!el) return;
    const a = el.dataset.action;
    const arg = el.dataset.arg, arg2 = el.dataset.arg2, arg3 = el.dataset.arg3;
    const actions = {
      'create-user': createUser,
      'sign-in': () => signIn(arg),
      'switch-user': switchUser,
      'set-view': () => { state.view = arg; render(); },
      'add-habit': () => addHabit(arg),
      'edit-habit': () => editHabit(arg),
      'toggle-day': () => toggleDay(arg, arg2),
      'weekly-toggle': () => weeklyToggle(arg),
      'weekly-inc': () => weeklyInc(arg),
      'weekly-dec': () => weeklyDec(arg),
      'link-partner': linkPartner,
      'quick-link': () => quickLink(arg),
      'unlink-partner': unlinkPartner,
      'cheer-habit': () => cheerHabit(arg, arg2, arg3),
      'send-note': sendNote,
      'toggle-theme': toggleTheme,
      'week-prev': () => { state.weekOffset--; render(); },
      'week-next': () => { state.weekOffset++; render(); },
      'week-current': () => { state.weekOffset = 0; render(); },
      'refresh': refresh

    if (actions[a]) { e.preventDefault(); actions[a](); }

    const me = state.users[state.currentUser];
    const partner = state.users[partnerName];
    const allComments = [
      ...(me.comments || []).filter(c => c.to === partnerName).map(c => ({...c, direction: 'sent'})),
      ...(partner.comments || []).filter(c => c.to === state.currentUser).map(c => ({...c, direction: 'received'}))
    ].sort((a, b) => b.date - a.date).slice(0, 20);

    return `

  async function createUser() {
    const input = document.getElementById('new-username');
    const errorEl = document.getElementById('setup-error');
    if (!input) return;
    const name = (input.value || '').trim().toLowerCase().replace(/\s+/g, '-');
    if (!name || name.length < 2) {
      if (errorEl) errorEl.textContent = 'Pick a username (at least 2 characters)';
      return;
    }
    await withSync(async () => {
      await dbUpsertUser(name);
      ensureUser(name);
      state.currentUser = name;
      saveLocalPrefs();
    });
    render();
  }

  async function signIn(name) {
    state.currentUser = name;
    ensureUser(name);
    saveLocalPrefs();
    render();
  }

  function switchUser() {
    state.currentUser = null;
    saveLocalPrefs();
    render();
  }

  async function addHabit(type) {
    const body = `
      <div class="modal-row">
        <label>Habit name</label>
        <input type="text" id="modal-habit-name" placeholder="e.g. Read 30 minutes" autocomplete="off" />
      </div>
      ${type === 'weekly' ? `
        <div class="modal-row">
          <label>Times per week</label>
          <input type="number" id="modal-habit-target" value="1" min="1" max="7" />
          <p style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">1 = simple done/not-done · 2+ = count target</p>
        </div>
      ` : ''}
    `;
    showModal(`New ${type} habit`, body, async () => {
      const name = document.getElementById('modal-habit-name').value.trim();
      if (!name) return;

      // Safety: skip if a habit with the same name was just created (within 5 seconds)
      const user = state.users[state.currentUser];
      const recentDuplicate = user.habits.find(h =>
        h.name.toLowerCase() === name.toLowerCase() &&
        h.type === type &&
        (Date.now() - h.created) < 5000
      );
      if (recentDuplicate) {
        console.log('Skipping duplicate habit creation');
        closeModal();
        return;
      }

      let target = 1;
      if (type === 'weekly') target = parseInt(document.getElementById('modal-habit-target').value) || 1;

      // New habits go to the end of their list
      const sameTypeHabits = user.habits.filter(h => h.type === type);
      const maxOrder = sameTypeHabits.reduce((max, h) => Math.max(max, h.sort_order || 0), 0);

      const habit = {
        id: 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        name, type, target,
        sort_order: maxOrder + 1000,
        created: Date.now()
      };
      await withSync(async () => {
        await dbInsertHabit(habit, state.currentUser);
        state.users[state.currentUser].habits.push(habit);
      });
      closeModal();
      render();
    });
  }

  async function editHabit(id) {
    const user = state.users[state.currentUser];
    const h = user.habits.find(x => x.id === id);
    if (!h) return;
    const body = `
      <div class="modal-row">
        <label>Name</label>
        <input type="text" id="modal-edit-name" value="${escapeHtml(h.name)}" autocomplete="off" />
      </div>
      ${h.type === 'weekly' ? `
        <div class="modal-row">
          <label>Weekly target</label>
          <input type="number" id="modal-edit-target" value="${h.target || 1}" min="1" max="7" />
        </div>
      ` : ''}
      <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);">
        <button data-modal-delete style="color: var(--danger); border-color: rgba(181,78,78,0.3); font-size: 12px;">Delete this habit</button>
      </div>
    `;
    showModal(`Edit habit`, body, async () => {
      const name = document.getElementById('modal-edit-name').value.trim();
      if (name) h.name = name;
      if (h.type === 'weekly') {
        const t = parseInt(document.getElementById('modal-edit-target').value);
        if (t) h.target = Math.max(1, t);
      }
      await withSync(async () => { await dbUpdateHabit(h); });
      closeModal();
      render();
    });
    const delBtn = modalContainer.querySelector('[data-modal-delete]');
    if (delBtn) {
      delBtn.addEventListener('click', async () => {
        if (!confirm(`Delete "${h.name}" and all its history?`)) return;
        await withSync(async () => {
          await dbDeleteHabit(id);
          user.habits = user.habits.filter(x => x.id !== id);
          delete user.checkins[id];
          delete user.weekly[id];
        });
        closeModal();
        render();
      });
    }
  }

  async function toggleDay(habitId, dateString) {
    const user = state.users[state.currentUser];
    if (!user.checkins[habitId]) user.checkins[habitId] = {};
    const currentlyDone = !!user.checkins[habitId][dateString];
    await withSync(async () => {
      if (currentlyDone) {
        await dbDeleteCheckin(habitId, dateString);
        delete user.checkins[habitId][dateString];
      } else {
        await dbInsertCheckin(habitId, dateString);
        user.checkins[habitId][dateString] = true;
      }
    });
    render();
  }

  async function weeklyToggle(id) {
    const user = state.users[state.currentUser];
    const wk = currentWeekKey();
    if (!user.weekly[id]) user.weekly[id] = {};
    const newVal = user.weekly[id][wk] >= 1 ? 0 : 1;
    await withSync(async () => {
      await dbUpsertWeekly(id, wk, newVal);
      user.weekly[id][wk] = newVal;
    });
    render();
  }

  async function weeklyInc(id) {
    const user = state.users[state.currentUser];
    const wk = currentWeekKey();
    if (!user.weekly[id]) user.weekly[id] = {};
    const newVal = (user.weekly[id][wk] || 0) + 1;
    await withSync(async () => {
      await dbUpsertWeekly(id, wk, newVal);
      user.weekly[id][wk] = newVal;
    });
    render();
  }

  async function weeklyDec(id) {
    const user = state.users[state.currentUser];
    const wk = currentWeekKey();
    if (!user.weekly[id]) user.weekly[id] = {};
    const newVal = Math.max(0, (user.weekly[id][wk] || 0) - 1);
    await withSync(async () => {
      await dbUpsertWeekly(id, wk, newVal);
      user.weekly[id][wk] = newVal;
    });
    render();
  }

  async function linkPartner() {
    const input = document.getElementById('partner-name');
    if (!input) return;
    const name = (input.value || '').trim().toLowerCase().replace(/\s+/g, '-');
    if (!name) return;
    if (name === state.currentUser) { alert("Can't partner with yourself!"); return; }
    if (!state.users[name]) {
      alert(`No user "${name}" has signed up yet. Ask them to open the site and create their username first.`);
      return;
    }
    await withSync(async () => {
      await dbUpdateUserPartner(state.currentUser, name);
      state.users[state.currentUser].partner = name;
      if (!state.users[name].partner) {
        await dbUpdateUserPartner(name, state.currentUser);
        state.users[name].partner = state.currentUser;
      }
    });
    render();
  }

  async function quickLink(name) {
    await withSync(async () => {
      await dbUpdateUserPartner(state.currentUser, name);
      state.users[state.currentUser].partner = name;
      if (!state.users[name].partner) {
        await dbUpdateUserPartner(name, state.currentUser);
        state.users[name].partner = state.currentUser;
      }
    });
    render();
  }

  async function unlinkPartner() {
    await withSync(async () => {
      await dbUpdateUserPartner(state.currentUser, null);
      state.users[state.currentUser].partner = null;
    });
    render();
  }

  async function cheerHabit(ownerName, habitId, habitName) {
    const body = `
      <div class="modal-row">
        <label>Your note about "${escapeHtml(habitName)}"</label>
        <input type="text" id="modal-cheer-text" placeholder="Keep it up!" autocomplete="off" />
      </div>
    `;
    showModal(`Send encouragement`, body, async () => {
      const text = document.getElementById('modal-cheer-text').value.trim();
      if (!text) return;
      const comment = {
        id: 'c_' + Date.now(),
        from: state.currentUser,
        to: ownerName,
        habitId, habitName, text,
        date: Date.now()
      };
      await withSync(async () => {
        await dbInsertComment(comment);
        const me = state.users[state.currentUser];
        me.comments = me.comments || [];
        me.comments.push(comment);
      });
      closeModal();
      render();
    });
  }

  async function sendNote() {
    const input = document.getElementById('cheer-text');
    if (!input) return;
    const text = (input.value || '').trim();
    if (!text) return;
    const me = state.users[state.currentUser];
    if (!me.partner) return;
    const comment = {
      id: 'c_' + Date.now(),
      from: state.currentUser,
      to: me.partner,
      text,
      date: Date.now()
    };
    await withSync(async () => {
      await dbInsertComment(comment);
      me.comments = me.comments || [];
      me.comments.push(comment);
    });
    input.value = '';
    render();
  }

  // ===== DRAG AND DROP =====
  let dragState = null;

  function initDragAndDrop() {
    // Set up draggable rows/cards
    document.querySelectorAll('[data-habit-id]').forEach(el => {
      el.addEventListener('dragstart', handleDragStart);
      el.addEventListener('dragover', handleDragOver);
      el.addEventListener('dragleave', handleDragLeave);
      el.addEventListener('drop', handleDrop);
      el.addEventListener('dragend', handleDragEnd);
    });

    // Only the drag handle initiates a drag (so clicking cells/buttons doesn't trigger it)
    document.querySelectorAll('[data-drag-handle]').forEach(handle => {
      handle.addEventListener('mousedown', () => {
        const row = handle.closest('[data-habit-id]');
        if (row) row.setAttribute('draggable', 'true');
      });
      handle.addEventListener('mouseup', () => {
        const row = handle.closest('[data-habit-id]');
        if (row) row.setAttribute('draggable', 'false');
      });

      // Touch support for mobile
      handle.addEventListener('touchstart', handleTouchStart, { passive: false });
    });
  }

  function handleDragStart(e) {
    const el = e.currentTarget;
    const habitId = el.dataset.habitId;
    const habitType = el.dataset.habitType;
    dragState = { habitId, habitType, sourceEl: el };
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', habitId);
  }

  function handleDragOver(e) {
    if (!dragState) return;
    const el = e.currentTarget;
    // Only allow drop on same type (daily with daily, weekly with weekly)
    if (el.dataset.habitType !== dragState.habitType) return;
    if (el === dragState.sourceEl) return;

    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';

    // Determine if dropping above or below based on mouse position
    const rect = el.getBoundingClientRect();
    const midpoint = rect.top + rect.height / 2;
    el.classList.remove('drag-over-above', 'drag-over-below');
    if (e.clientY < midpoint) {
      el.classList.add('drag-over-above');
    } else {
      el.classList.add('drag-over-below');
    }
  }

  function handleDragLeave(e) {
    e.currentTarget.classList.remove('drag-over-above', 'drag-over-below');
  }

  function handleDrop(e) {
    if (!dragState) return;
    e.preventDefault();
    const el = e.currentTarget;
    if (el.dataset.habitType !== dragState.habitType) return;
    if (el === dragState.sourceEl) return;

    const rect = el.getBoundingClientRect();
    const midpoint = rect.top + rect.height / 2;
    const dropAbove = e.clientY < midpoint;

    reorderHabit(dragState.habitId, el.dataset.habitId, dropAbove);
  }

  function handleDragEnd(e) {
    if (dragState && dragState.sourceEl) {
      dragState.sourceEl.classList.remove('dragging');
    }
    document.querySelectorAll('.drag-over-above, .drag-over-below').forEach(el => {
      el.classList.remove('drag-over-above', 'drag-over-below');
    });
    document.querySelectorAll('[data-habit-id]').forEach(el => {
      el.setAttribute('draggable', 'false');
    });
    dragState = null;
  }

  // Touch-based drag for mobile
  function handleTouchStart(e) {
    const handle = e.currentTarget;
    const row = handle.closest('[data-habit-id]');
    if (!row) return;

    e.preventDefault();
    const habitId = row.dataset.habitId;
    const habitType = row.dataset.habitType;
    const touch = e.touches[0];
    const startY = touch.clientY;

    row.classList.add('dragging');

    function getAllSiblings() {
      return Array.from(document.querySelectorAll(`[data-habit-type="${habitType}"]`));
    }

    function onTouchMove(ev) {
      ev.preventDefault();
      const t = ev.touches[0];
      // Find which habit we're hovering over
      const siblings = getAllSiblings();
      let hoveredEl = null;
      let dropAbove = false;
      for (const sib of siblings) {
        if (sib === row) continue;
        const r = sib.getBoundingClientRect();
        if (t.clientY >= r.top && t.clientY <= r.bottom) {
          hoveredEl = sib;
          dropAbove = t.clientY < r.top + r.height / 2;
          break;
        }
      }
      // Clear all indicators
      siblings.forEach(s => s.classList.remove('drag-over-above', 'drag-over-below'));
      if (hoveredEl) {
        hoveredEl.classList.add(dropAbove ? 'drag-over-above' : 'drag-over-below');
        row.dataset.touchTarget = hoveredEl.dataset.habitId;
        row.dataset.touchDropAbove = dropAbove;
      } else {
        delete row.dataset.touchTarget;
      }
    }

    function onTouchEnd() {
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', onTouchEnd);

      const targetId = row.dataset.touchTarget;
      const dropAbove = row.dataset.touchDropAbove === 'true';
      delete row.dataset.touchTarget;
      delete row.dataset.touchDropAbove;

      row.classList.remove('dragging');
      document.querySelectorAll('.drag-over-above, .drag-over-below').forEach(el => {
        el.classList.remove('drag-over-above', 'drag-over-below');
      });

      if (targetId) {
        reorderHabit(habitId, targetId, dropAbove);
      }
    }

    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onTouchEnd);
  }

  async function reorderHabit(draggedId, targetId, dropAbove) {
    const user = state.users[state.currentUser];
    if (!user) return;

    const dragged = user.habits.find(h => h.id === draggedId);
    if (!dragged) return;

    // Get all habits of the same type in current order
    const sameType = user.habits
      .filter(h => h.type === dragged.type)
      .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));

    // Remove dragged from list
    const withoutDragged = sameType.filter(h => h.id !== draggedId);

    // Find target index
    const targetIdx = withoutDragged.findIndex(h => h.id === targetId);
    if (targetIdx === -1) return;

    // Insert dragged at new position
    const insertIdx = dropAbove ? targetIdx : targetIdx + 1;
    withoutDragged.splice(insertIdx, 0, dragged);

    // Reassign sort_order values (0, 1000, 2000, ...)
    withoutDragged.forEach((h, idx) => {
      h.sort_order = idx * 1000;
    });

    // Re-sort the full habits list locally so render shows new order
    user.habits.sort((a, b) => {
      if (a.type !== b.type) return 0;
      return (a.sort_order || 0) - (b.sort_order || 0);
    });

    await withSync(async () => {
      await dbUpdateSortOrders(withoutDragged);
    });
    render();
  }
  (async function boot() {
    loadLocalPrefs();
    applyTheme();
    try {
      await loadAllData();
    } catch (e) {
      console.error('Boot failed:', e);
    }
    loadingOverlay.style.display = 'none';
    render();

    // Auto-refresh every 30 seconds to pick up partner's changes
    setInterval(async () => {
      if (state.currentUser) {
        await loadAllData();
        render();
      }
    }, 30000);
  })();
})();
</script>
